# Cấu hình DÀNH RIÊNG CHO DEV (Docker Compose tự động merge file này khi `docker compose up`).
# Mục đích: bind-mount thư mục public/ của host vào container để Vite dev server (`npm run dev`)
# hoạt động — container sẽ thấy public/hot và @vite tự chuyển sang nạp asset từ dev server,
# cho phép hot-reload (HMR) mà KHÔNG cần build lại image mỗi lần sửa Vue.
#
# Vue source nằm ở host (resources/js) nơi Vite tự watch, nên chỉ cần mount public/.
# Storage vẫn nằm trong image (tránh lỗi quyền ghi khi bind-mount toàn bộ).
services:
  app:
    volumes:
      - ./public:/var/www/html/public
